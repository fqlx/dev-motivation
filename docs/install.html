<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Install Dev Motivation</title>
    <style>
      body {
        background: #111;
        color: #f5f5f5;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        max-width: 560px;
        padding: 32px;
      }

      a {
        color: #fff;
      }

      .button {
        background: #e11d48;
        border-radius: 8px;
        display: inline-block;
        font-weight: 700;
        margin-top: 16px;
        padding: 12px 18px;
        text-decoration: none;
      }

      code {
        background: #222;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Install Dev Motivation</h1>
      <p>Open this plugin in Codex to install it from the FQLX GitHub marketplace.</p>
      <p><a class="button" id="install-link" href="codex://plugins/dev-motivation?remoteMarketplaceName=dev-motivation&amp;source=FQLX%2Fdev-motivation">Install in Codex</a></p>
      <p>If Codex does not open automatically, click the install button.</p>
    </main>
    <script>
      window.location.href = document.getElementById("install-link").href;
    </script>
  </body>
</html>
